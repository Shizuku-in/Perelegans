name: Release

on:
  push:
    branches:
      - "**"
    tags:
      - "*"

jobs:
  build-check:
    name: Build Check
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/Perelegans/Perelegans.csproj

      - name: Build
        run: dotnet build src/Perelegans/Perelegans.csproj -c Release --no-restore

  publish:
    name: Publish ${{ matrix.rid }}
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-x86]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/Perelegans/Perelegans.csproj

      - name: Publish framework-dependent release
        run: >-
          dotnet publish src/Perelegans/Perelegans.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained false
          -p:DebugType=None
          -p:DebugSymbols=false
          -o publish/${{ matrix.rid }}

      - name: Create 7z package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $rid = "${{ matrix.rid }}"
          $archiveName = "Perelegans-$tag-$rid.7z"
          $sevenZip = "$env:ProgramFiles\7-Zip\7z.exe"
          if (-not (Test-Path $sevenZip)) {
            $sevenZip = "7z"
          }
          Remove-Item -Path "publish/$rid/*.pdb" -Force -ErrorAction SilentlyContinue
          Push-Location "publish/$rid"
          try {
            & $sevenZip a -t7z -mx=9 "../$archiveName" "*"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
          finally {
            Pop-Location
          }

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: publish/Perelegans-${{ github.ref_name }}-${{ matrix.rid }}.7z
          if-no-files-found: error

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Publish release with assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.7z
